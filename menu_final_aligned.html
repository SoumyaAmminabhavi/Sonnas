    <style>
        :root {
            --cream: #FDFBF7;
            --blush: #F8E8E2;
            --cocoa: #4A3728;
            --beige: #E8DED4;
            --gold: #C5A059;
            --text: #2B2B2B;
            --accent: #F4C2C2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #ccc;
            color: var(--text);
            line-height: 1.6;
        }

        .page {
            width: 210mm;
            height: 297mm;
            padding: 20mm;
            margin: 20px auto;
            background: var(--cream);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media print {
            body { background: none; }
            .page { margin: 0; page-break-after: always; }
        }

        /* Texture Effect */
        .page::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            opacity: 0.1;
            pointer-events: none;
        }

        /* Border Decoration */
        .page-border {
            position: absolute;
            top: 10mm; left: 10mm; right: 10mm; bottom: 10mm;
            border: 1px solid var(--beige);
            pointer-events: none;
        }

        /* --- Page 1: Cover --- */
        .cover {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex: 1;
        }

        .logo-container {
            margin-bottom: 40px;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            letter-spacing: 6px;
            color: var(--cocoa);
            text-transform: uppercase;
            font-weight: 700;
        }

        .logo-subtext {
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            letter-spacing: 10px;
            color: var(--gold);
            margin-top: 10px;
            text-transform: uppercase;
        }

        .hero-collage {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 500px;
            margin: 60px 0;
        }

        .hero-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
            background: var(--beige);
        }

        .tagline {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 24px;
            color: var(--cocoa);
            margin-top: 40px;
        }

        /* --- Category Pages --- */
        .category-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .category-title {
            font-family: 'Playfair Display', serif;
            font-size: 38px;
            color: var(--cocoa);
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            display: inline-block;
            padding-bottom: 12px;
        }

        .category-title::after {
            content: "";
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 2px;
            background: var(--gold);
        }

        .items-grid {
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .item-card {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--blush);
        }

        .item-card:last-child {
            border-bottom: none;
        }

        .item-img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            background: var(--beige);
        }

        .item-info {
            flex: 1;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .item-name {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--cocoa);
            margin-right: 15px;
        }

        .item-desc {
            font-size: 14px;
            color: #555;
            margin-bottom: 15px;
            font-style: italic;
            max-width: 450px;
        }

        .item-pricing {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-align: right;
            min-width: fit-content;
        }

        .price-tag {
            color: var(--gold);
            background: rgba(197, 160, 89, 0.12);
            padding: 5px 12px;
            border-radius: 4px;
        }

        /* Footer */
        .footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            color: #888;
            border-top: 1px solid var(--beige);
            padding-top: 15px;
        }

        .footer b {
            color: var(--cocoa);
            letter-spacing: 1.5px;
        }
    </style>
</head>

        function formatPrice(paise) {
            return "₹" + (paise / 100).toLocaleString('en-IN');
        }

        function renderPage(content) {
            return `
                <div class="page">
                    <div class="page-border"></div>
                    ${content}
                    <div class="footer">
                        <div><b>SONNA’S PATISSERIE</b></div>
                        <div>@sonnas.patisserie | www.sonnas.in | +91 98XXX XXXXX</div>
                    </div>
                </div>
            `;
        }

        let html = "";

        // Helper to get image or placeholder
        const getImg = (catIdx, itemIdx) => {
            try {
                return menuData[catIdx]?.items[itemIdx]?.image || "";
            } catch(e) { return ""; }
        }

        // Page 1: Cover
        html += renderPage(`
            <div class="cover">
                <div class="logo-container">
                    <div class="logo-text">Sonna’s</div>
                    <div class="logo-subtext">Patisserie</div>
                </div>
                <div class="hero-collage">
                    <img class="hero-img" src="${getImg(0, 0)}" />
                    <img class="hero-img" src="${getImg(0, 1)}" />
                    <img class="hero-img" src="${getImg(1, 0)}" />
                    <img class="hero-img" src="${getImg(4, 0)}" />
                </div>
                <div class="tagline">
                    “Handcrafted Desserts • Artisanal Cakes • Luxury Patisserie”
                </div>
            </div>
        `);

        // Category Pages
        menuData.forEach((cat) => {
            if (cat.items.length === 0) return;

            let itemsHtml = cat.items.map(item => {
                let pricesHtml = "";
                if (cat.id === 'cheesecakes' || cat.id === 'slices') {
                    pricesHtml = `<div class="price-tag">${formatPrice(item.options[0].price)}</div>`;
                } else {
                    pricesHtml = item.options.map(opt => `
                        <div>${opt.size}: <span class="price-tag">${formatPrice(opt.price)}</span></div>
                    `).join('');
                }

                return `
                    <div class="item-card">
                        <img class="item-img" src="${item.image}" />
                        <div class="item-info">
                            <div class="item-header">
                                <div class="item-name">${item.name}</div>
                                <div class="item-pricing">
                                    ${pricesHtml}
                                </div>
                            </div>
                            <div class="item-desc">${item.description}</div>
                        </div>
                    </div>
                `;
            }).join('');

            html += renderPage(`
                <div class="category-header">
                    <div class="category-title">${cat.name}</div>
                </div>
                <div class="items-grid">
                    ${itemsHtml}
                </div>
            `);
        });

        document.getElementById('menu-content').innerHTML = html;
    </script>
