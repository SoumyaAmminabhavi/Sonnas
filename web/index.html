<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dine N Dash - Your favorite food delivered fast in Hubli">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Dine N Dash">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Dine N Dash</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    window.openRazorpayCheckout = function(options, onSuccess, onFailure) {
      // options is passed from Dart as a JS object/map
      options.handler = function(response) {
        if (onSuccess) {
          onSuccess(response.razorpay_payment_id);
        }
      };
      
      var rzp = new Razorpay(options);
      
      rzp.on('payment.failed', function(response) {
        if (onFailure) {
          onFailure(response.error.code, response.error.description);
        }
      });
      
      rzp.open();
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
